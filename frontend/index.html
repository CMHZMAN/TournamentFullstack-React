<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Error Banner -->
    <div id="error-banner" class="error-banner hidden">
        <div class="error-banner-content">
            <span id="error-banner-message"></span>
            <button class="error-banner-close" onclick="closeErrorBanner()">✕</button>
        </div>
    </div>

    <!-- Login Section -->
    <div id="login-section" class="section-container">
        <div class="login-form">
            <h1>Tournament Manager</h1>
            <p>Logga in för att komma igång</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Användarnamn:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Lösenord:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Logga in</button>
                <p id="login-error" class="error-message"></p>
            </form>
        </div>
    </div>

    <!-- Main Application Section -->
    <div id="app-section" class="section-container hidden">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>Tournament Manager</h1>
                <div class="user-info">
                    <span id="current-user"></span>
                    <button id="logout-btn" class="btn btn-secondary">Logga ut</button>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="app-layout">
            <!-- Left Sidebar - Tournaments List -->
            <aside class="tournaments-sidebar">
                <div class="sidebar-header">
                    <h2>Turneringar</h2>
                    <button class="btn btn-primary btn-small" onclick="showNewTournamentForm()">+ Ny</button>
                </div>

                <!-- New Tournament Form -->
                <form id="tournament-form" class="tournament-form-sidebar hidden">
                    <h3>Lägg till ny turnering</h3>
                    <div class="form-group">
                        <label for="tournament-title">Namn:</label>
                        <input type="text" id="tournament-title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="tournament-description">Beskrivning:</label>
                        <input type="text" id="tournament-description" name="description">
                    </div>
                    <div class="form-group">
                        <label for="tournament-maxplayers">Max spelare:</label>
                        <input type="number" id="tournament-maxplayers" name="maxPlayers" min="2" required>
                    </div>
                    <div class="form-group">
                        <label for="tournament-date">Datum:</label>
                        <input type="datetime-local" id="tournament-date" name="date" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Spara</button>
                        <button type="button" class="btn btn-secondary" onclick="hideTournamentForm()">Avbryt</button>
                    </div>
                    <p id="tournament-form-error" class="error-message"></p>
                </form>

                <!-- Tournaments List -->
                <div id="tournaments-list" class="tournaments-list-sidebar">
                    <p class="loading">Laddar turneringar...</p>
                </div>
            </aside>

            <!-- Right Main Content - Tournament Details & Games -->
            <main class="tournament-details">
                <!-- No Tournament Selected -->
                <div id="no-tournament-selected" class="no-selection">
                    <p>Välj en turnering från listan för att se och hantera spel</p>
                </div>

                <!-- Tournament Details -->
                <div id="tournament-details-view" class="tournament-details-view hidden">
                    <div class="tournament-header">
                        <div class="tournament-info">
                            <h2 id="details-tournament-title"></h2>
                            <p id="details-tournament-description"></p>
                        </div>
                        <div class="tournament-actions">
                            <button class="btn btn-primary" onclick="showEditTournamentForm()">Redigera</button>
                            <button class="btn btn-danger" onclick="deleteCurrentTournament()">Ta bort</button>
                        </div>
                    </div>

                    <div class="tournament-meta">
                        <div class="meta-item">
                            <span class="meta-label">Max spelare:</span>
                            <span id="details-tournament-maxplayers"></span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Datum:</span>
                            <span id="details-tournament-date"></span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Antal spel:</span>
                            <span id="details-tournament-gamecount"></span>
                        </div>
                    </div>

                    <!-- Games Section -->
                    <section class="games-section">
                        <div class="games-header">
                            <h3>Spel i turneringen</h3>
                            <button class="btn btn-primary btn-small" onclick="showNewGameForm()">+ Lägg till spel</button>
                        </div>

                        <!-- New Game Form -->
                        <form id="game-form" class="game-form-inline hidden">
                            <h4>Lägg till nytt spel</h4>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="game-title">Spel namn:</label>
                                    <input type="text" id="game-title" name="title" required>
                                </div>
                                <div class="form-group">
                                    <label for="game-time">Tid:</label>
                                    <input type="datetime-local" id="game-time" name="time" required>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Spara</button>
                                <button type="button" class="btn btn-secondary" onclick="hideGameForm()">Avbryt</button>
                            </div>
                            <p id="game-form-error" class="error-message"></p>
                        </form>

                        <!-- Games List -->
                        <div id="games-list" class="games-list-details">
                            <p class="loading">Laddar spel...</p>
                        </div>
                    </section>
                </div>

                <!-- Edit Tournament Form -->
                <form id="tournament-edit-form" class="tournament-form-inline hidden">
                    <h3>Redigera turnering</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tournament-title-edit">Namn:</label>
                            <input type="text" id="tournament-title-edit" name="title" required>
                        </div>
                        <div class="form-group">
                            <label for="tournament-description-edit">Beskrivning:</label>
                            <input type="text" id="tournament-description-edit" name="description">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tournament-maxplayers-edit">Max spelare:</label>
                            <input type="number" id="tournament-maxplayers-edit" name="maxPlayers" min="2" required>
                        </div>
                        <div class="form-group">
                            <label for="tournament-date-edit">Datum:</label>
                            <input type="datetime-local" id="tournament-date-edit" name="date" required>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Uppdatera</button>
                        <button type="button" class="btn btn-secondary" onclick="hideEditTournamentForm()">Avbryt</button>
                    </div>
                    <p id="tournament-edit-form-error" class="error-message"></p>
                </form>
            </main>
        </div>
    </div>

    <script src="js/api-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tournaments.js"></script>
    <script src="js/games.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
